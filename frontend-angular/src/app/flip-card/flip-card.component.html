{{flashcard.id}} | {{flashcard.category}}
<div class="flip-card" [ngClass]="{ 'flipped': isFlipped }" (click)="isFlipped = !isFlipped">
    <div class="flip-card-inner">
      <div class="flip-card-front">
        <h2>{{flashcard.question}}</h2>
      </div>
      <div class="flip-card-back">
        <h2>{{flashcard.answer}}</h2>
      </div>
    </div>
  </div>
  <button (click)="getFlashcard()">Losuj fiszkę</button>
